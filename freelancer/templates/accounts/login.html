{% extends "base.html" %}
{% load static %}

{% block content %}
<main class="container-main" style="padding: 3rem 0;">
  <div class="card" style="max-width: 420px; margin: 0 auto;">

    <div class="card__header">
      <div class="card__title">Вход</div>
      <div class="card__description">Войди в аккаунт</div>
    </div>

    <form method="post">
      {% csrf_token %}

      <div class="card__content demo-col">

        <div>
          <label class="label">Username или Email</label>
          <input name="username" class="input" required>
        </div>

        <div>
          <label class="label">Пароль</label>
          <input type="password" name="password" class="input" required>
        </div>
        {% if form.errors %}
          <div class="alert alert--destructive">
            {{ form.errors }}
          </div>
        {% endif %}

      </div>

      <div class="card__footer" style="flex-direction: column; gap: .5rem;">
        <button type="submit" class="btn btn--default btn--full">Submit</button>

        <a href="{% url 'signup' %}" class="btn btn--ghost btn--full">Signup</a>

        <a href="#" class="btn btn--link">Forget password</a>
      </div>
    </form>

  </div>
</main>
{% endblock %}
